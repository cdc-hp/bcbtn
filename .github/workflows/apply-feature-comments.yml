name: Apply GSBTN feature patches

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: ${{ github.event.issue.number == 5 && github.event.comment.body == '[DEV] APPLY GSBTN FEATURE 0.4.0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/duplicate-filter
          fetch-depth: 0
      - name: Rebuild patches from issue comments
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          import json
          import os
          import subprocess
          from pathlib import Path

          raw = subprocess.check_output(
              ["gh", "api", f"repos/{os.environ['REPOSITORY']}/issues/5/comments", "--paginate"],
              text=True,
              encoding="utf-8",
          )
          comments = json.loads(raw)
          prefixes = {
              "app": [f"GSBTN_APP_DIFF_PART_{i:02d}" for i in range(1, 6)],
              "core": [f"GSBTN_CORE_DIFF_PART_{i:02d}" for i in range(1, 4)],
          }
          latest = {}
          for comment in comments:
              body = comment.get("body") or ""
              first, _, rest = body.partition("\n")
              if first in prefixes["app"] + prefixes["core"]:
                  latest[first] = rest
          for name, expected in prefixes.items():
              missing = [key for key in expected if key not in latest]
              if missing:
                  raise SystemExit(f"Missing patch comments: {missing}")
              Path(f"{name}.patch").write_text("".join(latest[key] for key in expected), encoding="utf-8", newline="\n")
      - name: Apply patches and verify exact source
        shell: bash
        run: |
          git apply --check app.patch
          git apply app.patch
          git apply --check core.patch
          git apply core.patch
          echo "6b13b9806067b054572a170c033bd44d426632c7192aa13448afcfbaad21fe17  app.py" | sha256sum -c -
          echo "14a6ed7c602399638148d2b91656f7bf0659aaf28d48703417cbd6523490615e  core.py" | sha256sum -c -
          rm -f app.patch core.patch .decode-trigger backend.py deployment.py lan_api.py
          rm -rf .feature_payload
      - name: Commit feature source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bổ sung lọc trùng, menu và mô hình LAN"
          git push origin HEAD:agent/duplicate-filter
