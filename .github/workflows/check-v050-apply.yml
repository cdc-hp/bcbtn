name: Check and apply GSBTN v0.5.0

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  check:
    if: ${{ github.event.issue.number == 16 && contains(github.event.comment.body, '[CHECK VERIFIED V050]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lan-duplicates-backup
          fetch-depth: 0
      - name: Read comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/issues/16/comments?per_page=100" > comments.json
      - name: Reconstruct patch
        shell: python
        run: |
          import hashlib, json, re
          from pathlib import Path
          comments = json.loads(Path('comments.json').read_text(encoding='utf-8'))
          parts = {}
          def append(n, text):
              old = parts.get(n, '')
              if old and not old.endswith('\n') and text:
                  old += '\n'
              parts[n] = old + text
          for comment in comments:
              lines = str(comment.get('body') or '').splitlines(keepends=True)
              if not lines:
                  continue
              marker, content = lines[0].strip(), ''.join(lines[1:])
              m = re.fullmatch(r'GSBTN_V050_DIFF (\d+)/0?9', marker)
              if m and int(m.group(1)) not in parts:
                  parts[int(m.group(1))] = content; continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_CONT (\d+)/0?9', marker)
              if m:
                  append(int(m.group(1)), content); continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_REPLACE (\d+)/0?9', marker)
              if m:
                  n = int(m.group(1))
                  if n == 9:
                      fixed, stripping = [], False
                      for line in content.splitlines(keepends=True):
                          if line.startswith('+--- /dev/null'):
                              stripping = True
                          if stripping and line.startswith('+'):
                              line = line[1:]
                          fixed.append(line)
                      content = ''.join(fixed)
                  parts[n] = content; continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_CONT_PLUS1 (\d+)/0?9', marker)
              if m:
                  fixed = ''.join(line[1:] if line.startswith('+') else line for line in content.splitlines(keepends=True))
                  append(int(m.group(1)), fixed)
          patch = ''
          for n in range(1, 10):
              if patch and not patch.endswith('\n'):
                  patch += '\n'
              patch += parts.get(n, '')
          Path('v050.patch').write_text(patch, encoding='utf-8', newline='\n')
          Path('.v050-apply-stage.txt').write_text(
              'sha256=' + hashlib.sha256(Path('v050.patch').read_bytes()).hexdigest() + '\n', encoding='utf-8'
          )
      - name: Apply, compile and publish or record failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          git apply --check --verbose --ignore-space-change --ignore-whitespace v050.patch > check-output.txt 2>&1
          check_code=$?
          apply_code=99
          compile_code=99
          if [ "$check_code" -eq 0 ]; then
            git apply --ignore-space-change --ignore-whitespace v050.patch > apply-output.txt 2>&1
            apply_code=$?
          else
            : > apply-output.txt
          fi
          if [ "$apply_code" -eq 0 ]; then
            python -m py_compile app.py core.py deployment_config.py lan_server.py remote_core.py lan_discovery.py backup_manager.py duplicate_config.py > compile-output.txt 2>&1
            compile_code=$?
          else
            : > compile-output.txt
          fi
          {
            cat .v050-apply-stage.txt
            echo "check_code=$check_code"
            echo "apply_code=$apply_code"
            echo "compile_code=$compile_code"
            echo "--- check ---"
            cat check-output.txt
            echo "--- apply ---"
            cat apply-output.txt
            echo "--- compile ---"
            cat compile-output.txt
            echo "--- status ---"
            git status --short
          } > stage-report.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$check_code" -eq 0 ] && [ "$apply_code" -eq 0 ] && [ "$compile_code" -eq 0 ]; then
            find . -type d -name __pycache__ -prune -exec rm -rf {} +
            rm -f v050.patch comments.json check-output.txt apply-output.txt compile-output.txt stage-report.txt
            rm -f .v050-diagnostic.txt .v050-ping.txt .v050-apply-stage.txt
            git add -A
            git commit -m "Bổ sung LAN, lọc trùng nâng cao và sao lưu phục hồi"
            git push origin HEAD:agent/lan-duplicates-backup
            gh issue comment 16 --repo "$GITHUB_REPOSITORY" --body "Đã áp dụng và biên dịch thành công bản vá v0.5.0 trên nhánh phát triển."
          else
            git reset --hard HEAD
            mv stage-report.txt .v050-deploy-error.txt
            git add .v050-deploy-error.txt
            git commit -m "Ghi lỗi triển khai bản vá v0.5.0"
            git push origin HEAD:agent/lan-duplicates-backup
            exit 1
          fi
