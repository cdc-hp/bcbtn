name: Decode feature source

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  decode:
    if: ${{ github.event.issue.title == '[DEV] Decode duplicate-filter source' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/duplicate-filter
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode wrapped app and core
        shell: python
        run: |
          import ast
          import base64
          import zlib
          from pathlib import Path

          def decode_wrapper(path: str) -> str:
              text = Path(path).read_text(encoding='utf-8')
              tree = ast.parse(text)
              for node in tree.body:
                  if isinstance(node, ast.Assign):
                      for target in node.targets:
                          if isinstance(target, ast.Name) and target.id == '_PAYLOAD':
                              payload = ast.literal_eval(node.value)
                              return zlib.decompress(base64.b85decode(payload)).decode('utf-8')
              raise RuntimeError(f'No payload found in {path}')

          for filename in ('app.py', 'core.py'):
              source = decode_wrapper(filename)
              compile(source, filename, 'exec')
              Path(filename).write_text(source, encoding='utf-8', newline='\n')

          for temp in ('.github/workflows/introspect-source.yml', '.decode-trigger'):
              path = Path(temp)
              if path.exists():
                  path.unlink()
      - name: Commit readable source to feature branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Giải nén mã nguồn để phát triển lọc trùng"
          git push origin HEAD:agent/duplicate-filter
