name: Diagnose Windows build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'release-trigger-v0.3.0' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        shell: pwsh
        run: pip install -r requirements.txt
      - name: Run tests
        shell: pwsh
        run: python -m pytest -q --tb=short
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Run build and post full result
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          & cmd.exe /d /c "build.bat > build-output.txt 2>&1"
          $code = $LASTEXITCODE
          $output = Get-Content build-output.txt -Raw
          if ($output.Length -gt 50000) { $output = $output.Substring($output.Length - 50000) }
          $body = @"
          ## Windows build diagnostic

          Exit code: `$code`

          ```text
          $output
          ```
          "@
          $body | Set-Content build-comment.md -Encoding utf8
          gh issue comment 2 --body-file build-comment.md
          if ($code -ne 0) { exit $code }
