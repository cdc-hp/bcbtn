name: Apply verified GSBTN v0.5.0 patch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: ${{ github.event.issue.number == 16 && contains(github.event.comment.body, '[DEPLOY VERIFIED V050]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lan-duplicates-backup
          fetch-depth: 0
      - name: Read comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/issues/16/comments?per_page=100" > comments.json
      - name: Reconstruct verified patch
        shell: python
        run: |
          import hashlib, json, re
          from pathlib import Path
          comments = json.loads(Path('comments.json').read_text(encoding='utf-8'))
          parts = {}
          def append(n, text):
              old = parts.get(n, '')
              if old and not old.endswith('\n') and text:
                  old += '\n'
              parts[n] = old + text
          for comment in comments:
              lines = str(comment.get('body') or '').splitlines(keepends=True)
              if not lines:
                  continue
              marker, content = lines[0].strip(), ''.join(lines[1:])
              m = re.fullmatch(r'GSBTN_V050_DIFF (\d+)/0?9', marker)
              if m and int(m.group(1)) not in parts:
                  parts[int(m.group(1))] = content
                  continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_CONT (\d+)/0?9', marker)
              if m:
                  append(int(m.group(1)), content); continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_REPLACE (\d+)/0?9', marker)
              if m:
                  n = int(m.group(1))
                  if n == 9:
                      fixed, stripping = [], False
                      for line in content.splitlines(keepends=True):
                          if line.startswith('+--- /dev/null'):
                              stripping = True
                          if stripping and line.startswith('+'):
                              line = line[1:]
                          fixed.append(line)
                      content = ''.join(fixed)
                  parts[n] = content
                  continue
              m = re.fullmatch(r'GSBTN_V050_DIFF_CONT_PLUS1 (\d+)/0?9', marker)
              if m:
                  fixed = ''.join(line[1:] if line.startswith('+') else line for line in content.splitlines(keepends=True))
                  append(int(m.group(1)), fixed)
          if set(parts) != set(range(1, 10)):
              raise SystemExit(f'Missing parts: {sorted(set(range(1,10))-set(parts))}')
          patch = ''
          for n in range(1, 10):
              if patch and not patch.endswith('\n'):
                  patch += '\n'
              patch += parts[n]
          Path('v050.patch').write_text(patch, encoding='utf-8', newline='\n')
          digest = hashlib.sha256(Path('v050.patch').read_bytes()).hexdigest()
          expected = 'cc206a3b146b2b7ec94983b67b0964598ec2b0723ad4eaedb80384d294d05cbf'
          if digest != expected:
              raise SystemExit(f'Checksum mismatch: {digest}')
          allowed = {
              'app.py', 'core.py', 'deployment_config.py', 'lan_server.py', 'remote_core.py',
              'lan_discovery.py', 'backup_manager.py', 'duplicate_config.py', 'setup.iss',
              'VERSION.txt', 'README.md', 'SCHEMA.md', 'tests/test_advanced_features.py',
          }
          touched = set()
          for line in patch.splitlines():
              if line.startswith('+++ '):
                  path = line[4:].strip()
                  if path != '/dev/null':
                      touched.add(path[2:] if path.startswith('b/') else path)
          if touched != allowed:
              raise SystemExit(f'Unexpected paths: {sorted(touched)}')
          print('Verified patch SHA-256:', digest)
      - name: Apply patch
        run: |
          git apply --check --ignore-space-change --ignore-whitespace v050.patch
          git apply --ignore-space-change --ignore-whitespace v050.patch
          rm -f v050.patch comments.json .v050-diagnostic.txt .v050-ping.txt .v050-apply-stage.txt
      - name: Compile sources
        run: python -m py_compile app.py core.py deployment_config.py lan_server.py remote_core.py lan_discovery.py backup_manager.py duplicate_config.py
      - name: Verify no user data
        run: |
          if find . -path ./.git -prune -o -type f \( -iname '*.db' -o -iname '*.sqlite' -o -iname '*.sqlite3' -o -iname '*.xlsx' -o -iname '*.xls' -o -iname '*.xlsm' -o -iname '*.csv' \) -print | grep -q .; then
            echo 'Forbidden data file found.' >&2
            exit 1
          fi
          if find . -path ./.git -prune -o -type d \( -name data -o -name backups -o -name update_cache \) -print | grep -q .; then
            echo 'Forbidden data directory found.' >&2
            exit 1
          fi
      - name: Commit feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bổ sung LAN, lọc trùng nâng cao và sao lưu phục hồi"
          git push origin HEAD:agent/lan-duplicates-backup
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 16 --repo "$GITHUB_REPOSITORY" --body "Đã áp dụng bản vá v0.5.0 đã xác minh vào nhánh \`agent/lan-duplicates-backup\`."
