name: Build and Publish Windows Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Read and validate version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION.txt -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION.txt must contain a semantic version such as 0.4.0"
          }
          $tag = "v$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) { throw "Unable to query tags from origin." }
          $releaseExists = if ($existingTag) { "true" } else { "false" }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_exists=$releaseExists" >> $env:GITHUB_OUTPUT
          if ($releaseExists -eq "true" -and "${{ github.event_name }}" -ne "pull_request") {
            Write-Host "Release $tag already exists; validation/build steps are skipped for this push."
          }

      - name: Verify repository contains no user data
        shell: pwsh
        run: |
          $forbiddenExtensions = @('.db', '.sqlite', '.sqlite3', '.xlsx', '.xls', '.xlsm', '.csv')
          $forbiddenDirectories = @('data', 'backups', 'update_cache')
          # File mẫu Excel công khai qua GitHub Pages cho các xã tải — chỉ có 48 cột tiêu đề
          # (khớp CASE_FIELDS trong core.py), không chứa dữ liệu ca bệnh thật. Loại trừ tường
          # minh khỏi kiểm tra "không có dữ liệu người dùng" thay vì nới lỏng phần mở rộng .xlsx
          # nói chung (vẫn phải chặn mọi file .xlsx khác không nằm trong allowlist này).
          $allowedDataFiles = @('docs/Mau_Danh_sach_ca_benh.xlsx')
          $tracked = git ls-files
          $forbiddenFiles = $tracked | Where-Object {
            ($forbiddenExtensions -contains [IO.Path]::GetExtension($_).ToLower()) -and ($allowedDataFiles -notcontains $_)
          }
          $forbiddenDirs = $tracked | Where-Object {
            $parts = $_ -split '[/\\]'
            @($parts | Where-Object { $forbiddenDirectories -contains $_.ToLower() }).Count -gt 0
          }
          if ($forbiddenFiles -or $forbiddenDirs) {
            $forbiddenFiles | ForEach-Object { Write-Error "Forbidden tracked data file: $_" }
            $forbiddenDirs | ForEach-Object { Write-Error "Forbidden tracked data path: $_" }
            exit 1
          }

      - name: Install Python dependencies
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: python -m pytest -q

      - name: Install Inno Setup
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build application and installer
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: cmd
        run: build.bat

      - name: Verify Web App installs and runs as a Windows Service
        # windows-latest chạy với quyền Administrator — kiểm thử được đúng phần sandbox phát
        # triển KHÔNG làm được (xem TASKS.md Giai đoạn 8/9): cài thật bằng installer đã build,
        # xác nhận dịch vụ Windows thật sự chạy + trả lời HTTP, rồi gỡ đăng ký sạch sẽ.
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $installer = "setup_output/CDC-GiamSatDichBenh-Server-Setup-v$version.exe"
          $installDir = "$env:ProgramFiles\CDC-GiamSatDichBenh"

          Start-Process -FilePath $installer -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait

          $service = Get-Service -Name CDCGiamSatDichBenh -ErrorAction SilentlyContinue
          if (-not $service -or $service.Status -ne 'Running') {
            Start-Sleep -Seconds 5
            $service = Get-Service -Name CDCGiamSatDichBenh -ErrorAction Stop
          }
          if ($service.Status -ne 'Running') {
            # Chẩn đoán trước khi báo lỗi: xem Event Log (pywin32/servicemanager thường ghi
            # traceback lỗi khởi động vào đây) và tự chạy "run" (đường code giống hệt SvcDoRun,
            # xem service_windows.py) để lộ ra lỗi Python thật thay vì chỉ biết "Stopped".
            Write-Host "=== Application Event Log (nguồn CDCGiamSatDichBenh/Python Service/.NET Runtime) ==="
            Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddMinutes(-10)} -ErrorAction SilentlyContinue |
              Where-Object { $_.ProviderName -match 'CDCGiamSatDichBenh|Python|Service Control Manager|\.NET' } |
              Select-Object -First 20 TimeCreated, ProviderName, Id, Message | Format-List | Out-String -Width 200 | Write-Host

            Write-Host "=== Chạy trực tiếp 'CDCGiamSatDichBenh.exe run' để lộ lỗi Python thật ==="
            $diagLog = "$env:RUNNER_TEMP\cdc_run_diag.log"
            $proc = Start-Process -FilePath "$installDir\CDCGiamSatDichBenh.exe" -ArgumentList 'run' `
              -RedirectStandardOutput $diagLog -RedirectStandardError "$diagLog.err" -PassThru -NoNewWindow
            Start-Sleep -Seconds 6
            if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
            Write-Host "--- stdout ---"; Get-Content $diagLog -ErrorAction SilentlyContinue | Write-Host
            Write-Host "--- stderr ---"; Get-Content "$diagLog.err" -ErrorAction SilentlyContinue | Write-Host

            throw "Dich vu CDCGiamSatDichBenh khong o trang thai Running: $($service.Status)"
          }

          # SCM báo dịch vụ "Running" ngay khi SvcDoRun() bắt đầu chạy (trước khi uvicorn kịp mở
          # cổng lắng nghe thật sự) — dò lặp lại vài lần thay vì gọi 1 lần duy nhất ngay sau khi
          # thấy "Running", tránh lỗi "actively refused" do đến quá sớm (lỗi thật gặp phải: dịch
          # vụ đã Running đúng nhưng health check đầu tiên vẫn bị từ chối kết nối).
          $health = $null
          for ($i = 0; $i -lt 10; $i++) {
            try {
              $health = Invoke-RestMethod -Uri 'http://127.0.0.1:8765/health' -TimeoutSec 5
              break
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          if (-not $health -or $health.status -ne 'ok') {
            throw "Health check khong hop le sau nhieu lan thu: $($health | ConvertTo-Json -Compress)"
          }
          Write-Host "Da xac nhan dich vu Windows chay dung: $($health | ConvertTo-Json -Compress)"

          # Dung bo go cai THAT do Inno Setup sinh ra (khong tu goi stop/remove tay) de kiem thu
          # dung [UninstallRun] nhu trai nghiem that cua CDC khi go cai qua Control Panel.
          $uninstaller = Get-ChildItem -Path $installDir -Filter 'unins*.exe' | Select-Object -First 1
          if (-not $uninstaller) { throw "Khong tim thay file go cai trong $installDir" }
          Start-Process -FilePath $uninstaller.FullName -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          Start-Sleep -Seconds 2
          if (Get-Service -Name CDCGiamSatDichBenh -ErrorAction SilentlyContinue) {
            throw "Dich vu CDCGiamSatDichBenh van con sau khi go dang ky."
          }
          Write-Host "Da xac nhan go dang ky dich vu thanh cong."

      - name: Verify build contains no user data
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem dist,dist_cdc_service,setup_output -Recurse -File -ErrorAction SilentlyContinue | Where-Object {
            $_.Extension.ToLower() -in '.db','.sqlite','.sqlite3','.xlsx','.xls','.xlsm','.csv'
          }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error "Forbidden data file in release: $($_.FullName)" }
            exit 1
          }

      - name: Create portable ZIP
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "dist/GiamSatDichBenh/*" -DestinationPath "GiamSatDichBenh-Portable-v$version.zip" -Force

      - name: Generate SHA-256 checksums
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $files = @(
            "setup_output/GiamSatDichBenh-Setup-v$version.exe",
            "setup_output/GiamSatDichBenh-Server-Setup-v$version.exe",
            "setup_output/GiamSatDichBenh-Admin-Setup-v$version.exe",
            "setup_output/CDC-GiamSatDichBenh-Server-Setup-v$version.exe",
            "GiamSatDichBenh-Portable-v$version.zip"
          )
          foreach ($file in $files) { if (-not (Test-Path $file)) { throw "Missing release file: $file" } }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $([IO.Path]::GetFileName($file))"
          }
          $lines | Set-Content "SHA256SUMS.txt" -Encoding ascii

      - name: Create tag and GitHub Release
        if: github.event_name != 'pull_request' && steps.version.outputs.release_exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag HEAD -m "Release $tag"
          git push origin $tag
          gh release create $tag `
            "setup_output/GiamSatDichBenh-Setup-v$version.exe" `
            "setup_output/GiamSatDichBenh-Server-Setup-v$version.exe" `
            "setup_output/GiamSatDichBenh-Admin-Setup-v$version.exe" `
            "setup_output/CDC-GiamSatDichBenh-Server-Setup-v$version.exe" `
            "GiamSatDichBenh-Portable-v$version.zip" `
            "SHA256SUMS.txt" `
            --title "Giám sát dịch bệnh $tag" `
            --generate-notes

      - name: Upload workflow artifacts
        if: github.event_name == 'pull_request' || steps.version.outputs.release_exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GiamSatDichBenh-v${{ steps.version.outputs.version }}
          path: |
            setup_output/GiamSatDichBenh-Setup-v${{ steps.version.outputs.version }}.exe
            setup_output/GiamSatDichBenh-Server-Setup-v${{ steps.version.outputs.version }}.exe
            setup_output/GiamSatDichBenh-Admin-Setup-v${{ steps.version.outputs.version }}.exe
            setup_output/CDC-GiamSatDichBenh-Server-Setup-v${{ steps.version.outputs.version }}.exe
            GiamSatDichBenh-Portable-v${{ steps.version.outputs.version }}.zip
            SHA256SUMS.txt
