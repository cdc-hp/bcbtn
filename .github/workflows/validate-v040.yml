name: Validate v0.4.0 on Windows

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.head_ref == 'validate-v040-trigger' }}
    runs-on: windows-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/duplicate-filter
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Verify tracked source contains no user data
        shell: pwsh
        run: |
          $forbidden = @('.db', '.sqlite', '.sqlite3', '.xlsx', '.xls', '.xlsm', '.csv')
          $bad = git ls-files | Where-Object { $forbidden -contains [IO.Path]::GetExtension($_).ToLower() }
          if ($bad) {
            $bad | ForEach-Object { Write-Error "Forbidden tracked data file: $_" }
            exit 1
          }
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile and test
        shell: pwsh
        run: |
          python -m py_compile app.py core.py deployment_config.py lan_server.py remote_core.py
          python -m pytest -q
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Build Setup and portable application
        shell: cmd
        run: build.bat
      - name: Verify build products
        shell: pwsh
        run: |
          $version = (Get-Content VERSION.txt -Raw).Trim()
          $setup = "setup_output/GiamSatDichBenh-Setup-v$version.exe"
          if (-not (Test-Path $setup)) { throw "Missing $setup" }
          if (-not (Test-Path 'dist/GiamSatDichBenh/GiamSatDichBenh.exe')) { throw 'Missing application executable' }
          $bad = Get-ChildItem dist,setup_output -Recurse -File | Where-Object { $_.Extension.ToLower() -in '.db','.sqlite','.sqlite3','.xlsx','.xls','.xlsm','.csv' }
          if ($bad) { $bad | ForEach-Object { Write-Error $_.FullName }; exit 1 }
      - name: Upload validation artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GSBTN-v0.4.0-validation
          path: |
            setup_output/GiamSatDichBenh-Setup-v0.4.0.exe
            dist/GiamSatDichBenh/**
