name: Verify GSBTN v0.5.0 on Windows

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  verify-windows:
    if: ${{ github.event.issue.number == 16 && contains(github.event.comment.body, '[VERIFY WINDOWS V050]') }}
    runs-on: windows-latest
    steps:
      - name: Checkout v0.5.0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/lan-duplicates-backup
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate version and source
        shell: pwsh
        run: |
          $version = (Get-Content VERSION.txt -Raw).Trim()
          if ($version -ne '0.5.0') { throw "Expected VERSION.txt=0.5.0, got $version" }
          $forbiddenExtensions = @('.db', '.sqlite', '.sqlite3', '.xlsx', '.xls', '.xlsm', '.csv')
          $forbiddenDirectories = @('data', 'backups', 'update_cache')
          $forbiddenFiles = Get-ChildItem . -Recurse -File -Force | Where-Object {
            $_.FullName -notmatch '\\.git\\' -and ($forbiddenExtensions -contains $_.Extension.ToLower())
          }
          $forbiddenDirs = Get-ChildItem . -Recurse -Directory -Force | Where-Object {
            $_.FullName -notmatch '\\.git\\' -and ($forbiddenDirectories -contains $_.Name.ToLower())
          }
          if ($forbiddenFiles -or $forbiddenDirs) {
            $forbiddenFiles | ForEach-Object { Write-Error "Forbidden data file: $($_.FullName)" }
            $forbiddenDirs | ForEach-Object { Write-Error "Forbidden data directory: $($_.FullName)" }
            exit 1
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build application and installer
        shell: cmd
        run: build.bat

      - name: Verify release output contains no user data
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem dist,setup_output -Recurse -File -ErrorAction SilentlyContinue | Where-Object {
            $_.Extension.ToLower() -in '.db','.sqlite','.sqlite3','.xlsx','.xls','.xlsm','.csv'
          }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error "Forbidden data file in release: $($_.FullName)" }
            exit 1
          }
          if (-not (Test-Path 'setup_output/GiamSatDichBenh-Setup-v0.5.0.exe')) {
            throw 'Installer was not created.'
          }

      - name: Create portable and checksums
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist/GiamSatDichBenh/*' -DestinationPath 'GiamSatDichBenh-Portable-v0.5.0.zip' -Force
          $files = @('setup_output/GiamSatDichBenh-Setup-v0.5.0.exe', 'GiamSatDichBenh-Portable-v0.5.0.zip')
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $([IO.Path]::GetFileName($file))"
          }
          $lines | Set-Content 'SHA256SUMS.txt' -Encoding ascii

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GSBTN-v0.5.0-Windows-verified
          path: |
            setup_output/GiamSatDichBenh-Setup-v0.5.0.exe
            GiamSatDichBenh-Portable-v0.5.0.zip
            SHA256SUMS.txt
