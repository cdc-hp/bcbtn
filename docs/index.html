<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nộp danh sách ca bệnh — CDC Hải Phòng</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #e2e8f0; }
  header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px 16px;
    background: #eff6ff; color: #1e3a8a; box-shadow: 0 3px 10px rgba(30,58,138,.10);
    border-radius: 0 0 18px 18px;
  }
  .logo-badge {
    flex: none; width: 32px; height: 32px; border-radius: 9px; object-fit: contain;
    box-shadow: 0 1px 4px rgba(30,58,138,.20); background: #fff;
  }
  header strong { font-weight: 700; }
  header span.sub { opacity: .85; font-size: .85rem; }
  #frame-wrap { position: absolute; top: 60px; left: 0; right: 0; bottom: 0; }
  iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity .25s; }
  iframe.loaded { opacity: 1; }
  #loading {
    position: absolute; top: 60px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px; color: #64748b; font-size: .88rem;
  }
  #loading .spinner {
    width: 26px; height: 26px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #fallback { max-width: 560px; margin: 80px auto; padding: 16px; text-align: center; color: #991b1b; }
</style>
</head>
<body>
<header>
  <img class="logo-badge" src="logo.png" alt="CDC Hải Phòng">
  <div><strong>CDC Hải Phòng</strong> — Nộp danh sách ca bệnh hằng tuần</div>
</header>
<div id="frame-wrap">
  <div id="loading"><div class="spinner"></div>Đang tải trang nộp báo cáo...</div>
  <iframe id="gasFrame" title="Nộp danh sách ca bệnh"></iframe>
</div>
<div id="fallback" style="display:none">
  Chưa cấu hình được link nộp báo cáo. Vui lòng liên hệ CDC Hải Phòng để được hỗ trợ.
</div>
<script src="config.js"></script>
<script>
  if (typeof GAS_URL === "string" && GAS_URL.indexOf("https://script.google.com/") === 0) {
    var frame = document.getElementById("gasFrame");
    frame.addEventListener("load", function () {
      document.getElementById("loading").style.display = "none";
      frame.classList.add("loaded");
    });
    frame.src = GAS_URL;
  } else {
    document.getElementById("frame-wrap").style.display = "none";
    document.getElementById("fallback").style.display = "block";
  }
</script>
</body>
</html>
